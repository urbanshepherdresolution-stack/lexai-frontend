<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexAI — Legal Intelligence</title>
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #f4f7f9; color: #1a202c; display: flex; justify-content: center; padding: 40px 20px; margin: 0; }
        .app-container { background: white; width: 100%; max-width: 600px; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { font-size: 24px; margin-bottom: 20px; color: #2d3748; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
        .tab { cursor: pointer; padding: 5px 10px; color: #718096; font-weight: 500; }
        .tab.active { color: #1a365d; border-bottom: 2px solid #1a365d; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; }
        button { width: 100%; background-color: #1a365d; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #2c5282; }
        button:disabled { background-color: #a0aec0; cursor: not-allowed; }
        #result { margin-top: 25px; padding: 15px; background: #f8fafc; border-left: 4px solid #1a365d; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <h1>LexAI — Legal Intelligence</h1>
    
    <div class="tabs">
        <div class="tab active" onclick="setMode('analyze')">AI Analyst</div>
        <div class="tab" onclick="setMode('wordcount')">Word Counter</div>
    </div>

    <textarea id="query" placeholder="Enter your text or legal inquiry here..."></textarea>
    <button id="actionBtn" onclick="processData()">Analyze Matter</button>
    <div id="result"></div>
</div>

<script>
    let mode = 'analyze';

    function setMode(newMode) {
        mode = newMode;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase().includes(newMode)));
        document.getElementById('actionBtn').innerText = (mode === 'analyze') ? 'Analyze Matter' : 'Count Words';
    }

    async function processData() {
        const text = document.getElementById('query').value;
        const resultDiv = document.getElementById('result');
        const btn = document.getElementById('actionBtn');

        if (mode === 'wordcount') {
            const count = text.trim().split(/\s+/).filter(word => word.length > 0).length;
            resultDiv.style.display = 'block';
            resultDiv.innerText = `Word Count: ${count}`;
            return;
        }

        // AI Analyst Mode
        btn.disabled = true;
        btn.innerText = "Analyzing...";
        resultDiv.style.display = 'block';
        resultDiv.innerText = "Processing...";

        try {
            const response = await fetch('/api/transcribe', {
                method: 'POST',
                body: new URLSearchParams({ query: text })
            });
            const data = await response.json();
            resultDiv.innerText = data.message;
        } catch (err) {
            resultDiv.innerText = "Error: Could not reach the server.";
        } finally {
            btn.disabled = false;
            btn.innerText = "Analyze Matter";
        }
    }
</script>

</body>
</html>
