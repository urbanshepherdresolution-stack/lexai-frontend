<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counsel — AI Legal Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --ink: #1a1a2e; --ink-soft: #3d3d5c; --parchment: #faf8f3; --cream: #f2ede3;
    --gold: #c8952a; --gold-light: #e8c46a; --border: #ddd8cc; --white: #ffffff;
    --user-bg: #1a1a2e; --sidebar-w: 280px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--parchment); color: var(--ink); height: 100vh; display: flex; overflow: hidden; }
  
  /* Sidebar & Layout styles remain identical to your original */
  .sidebar { width: var(--sidebar-w); background: var(--ink); color: #e8e4da; display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid #2d2d4a; }
  .sidebar-brand { padding: 28px 24px 20px; border-bottom: 1px solid #2d2d4a; }
  .brand-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 600; color: var(--gold-light); }
  .practice-btn { width: 100%; padding: 9px 12px; background: none; border: none; border-radius: 6px; color: #c8c4d8; text-align: left; cursor: pointer; }
  .practice-btn:hover, .practice-btn.active { background: #2a2a48; color: var(--gold-light); }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .header { background: var(--white); border-bottom: 1px solid var(--border); padding: 0 32px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
  .chat-area { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 20px; }
  .msg { display: flex; gap: 12px; max-width: 760px; width: 100%; }
  .msg.user { margin-left: auto; flex-direction: row-reverse; }
  .msg-bubble { padding: 14px 18px; border-radius: 12px; font-size: 0.9rem; line-height: 1.75; }
  .input-area { padding: 16px 32px 20px; background: var(--white); border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 10px; max-width: 760px; margin: 0 auto; }
  .input-box { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; background: var(--parchment); outline: none; }
  .send-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--ink); color: var(--gold-light); border: none; cursor: pointer; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><div class="brand-name">Counsel</div><div class="brand-tagline">AI Legal Assistant</div></div>
  <div class="sidebar-section">
    <button class="practice-btn active" onclick="setTopic(this, 'UK Legal Advice')">⚖️ General Law</button>
    <button class="practice-btn" onclick="setTopic(this, 'Tenant Rights')">🏠 Tenant Rights</button>
  </div>
</aside>

<main class="main">
  <header class="header"><div class="header-topic" id="headerTopic">General Legal Advice</div></header>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" class="input-box" placeholder="Describe your legal situation..."></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</main>

<script>
  let currentTopic = 'General Legal Advice';

  function setTopic(btn, topic) {
    document.querySelectorAll('.practice-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTopic = topic;
    document.getElementById('headerTopic').textContent = topic;
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    // UI Update
    const chatArea = document.getElementById('chatArea');
    chatArea.innerHTML += `<div class="msg user"><div class="msg-bubble">${text}</div></div>`;
    input.value = '';

    try {
      const response = await fetch('/api/transcribe', {
        method: 'POST',
        body: new URLSearchParams({ query: text + " [Context: " + currentTopic + "]" })
      });
      const data = await response.json();
      chatArea.innerHTML += `<div class="msg ai"><div class="msg-bubble">${data.message}</div></div>`;
    } catch (err) {
      chatArea.innerHTML += `<div class="msg ai"><div class="msg-bubble">Connection error. Please try again.</div></div>`;
    }
  }
</script>
</body>
</html>
