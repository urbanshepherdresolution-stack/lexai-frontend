<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counsel — AI Legal Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --ink:        #1a1a2e;
    --ink-soft:   #3d3d5c;
    --parchment:  #faf8f3;
    --cream:      #f2ede3;
    --gold:       #c8952a;
    --gold-light: #e8c46a;
    --seal:       #8b1a1a;
    --border:     #ddd8cc;
    --white:      #ffffff;
    --user-bg:    #1a1a2e;
    --ai-bg:      #ffffff;
    --sidebar-w:  280px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--parchment);
    color: var(--ink);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--ink);
    color: #e8e4da;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    border-right: 1px solid #2d2d4a;
  }

  .sidebar-brand {
    padding: 28px 24px 20px;
    border-bottom: 1px solid #2d2d4a;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 600;
    color: var(--gold-light);
    letter-spacing: 0.04em;
  }

  .brand-tagline {
    font-size: 0.72rem;
    color: #8888aa;
    margin-top: 3px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .sidebar-section {
    padding: 18px 16px 10px;
  }

  .sidebar-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #6666aa;
    padding: 0 8px;
    margin-bottom: 8px;
  }

  .practice-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    padding: 9px 12px;
    background: none;
    border: none;
    border-radius: 6px;
    color: #c8c4d8;
    font-size: 0.82rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s;
    margin-bottom: 2px;
  }

  .practice-btn:hover, .practice-btn.active {
    background: #2a2a48;
    color: var(--gold-light);
  }

  .practice-btn .icon { font-size: 1rem; width: 20px; text-align: center; }

  .sidebar-footer {
    margin-top: auto;
    padding: 16px 24px;
    border-top: 1px solid #2d2d4a;
    font-size: 0.7rem;
    color: #555577;
    line-height: 1.6;
  }

  /* ── MAIN ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  /* ── HEADER ── */
  .header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-topic {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--ink);
  }

  .disclaimer-badge {
    background: #fff8e6;
    border: 1px solid var(--gold-light);
    color: #7a5a00;
    font-size: 0.68rem;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.04em;
  }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  /* Welcome Screen, Message bubbles, and Input Area Styles remain as per your original file */
  /* (Abbreviated here for clarity; paste the full original CSS if you have it) */

  .input-area {
    padding: 16px 32px 20px;
    background: var(--white);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 760px;
    margin: 0 auto;
  }

  .input-box {
    flex: 1;
    resize: none;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.9rem;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: var(--parchment);
    outline: none;
    line-height: 1.6;
    max-height: 160px;
  }

  .send-btn {
    width: 44px; height: 44px;
    border-radius: 10px;
    background: var(--ink);
    border: none;
    color: var(--gold-light);
    font-size: 1.1rem;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-name">Counsel</div>
    <div class="brand-tagline">AI Legal Assistant</div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Practice Areas</div>
    <!-- Restored buttons -->
    <button class="practice-btn active" onclick="setTopic(this, 'General Legal Advice')"><span class="icon">⚖️</span> General Law</button>
    <button class="practice-btn" onclick="setTopic(this, 'Tenant & Landlord Rights')"><span class="icon">🏠</span> Tenant Rights</button>
    <button class="practice-btn" onclick="setTopic(this, 'Employment Law')"><span class="icon">💼</span> Employment</button>
    <button class="practice-btn" onclick="setTopic(this, 'Family Law & Divorce')"><span class="icon">👨‍👩‍👧</span> Family Law</button>
    <button class="practice-btn" onclick="setTopic(this, 'Small Claims & Disputes')"><span class="icon">🤝</span> Small Claims</button>
    <button class="practice-btn" onclick="setTopic(this, 'Consumer Rights')"><span class="icon">🛒</span> Consumer Rights</button>
    <button class="practice-btn" onclick="setTopic(this, 'Contract Law')"><span class="icon">📄</span> Contracts</button>
    <button class="practice-btn" onclick="setTopic(this, 'Immigration Law')"><span class="icon">🌍</span> Immigration</button>
    <button class="practice-btn" onclick="setTopic(this, 'Criminal Defense & Rights')"><span class="icon">🔒</span> Criminal Rights</button>
    <button class="practice-btn" onclick="setTopic(this, 'Personal Injury')"><span class="icon">🏥</span> Personal Injury</button>
  </div>

  <div class="sidebar-footer">
    Counsel provides general legal information, not formal legal advice. For complex or urgent matters, consult a qualified attorney.
  </div>
</aside>

<!-- MAIN -->
<div class="main">
  <header class="header">
    <div class="header-topic" id="headerTopic">General Legal Advice</div>
    <div class="disclaimer-badge">ℹ️ General information only</div>
  </header>
  
  <div class="chat-area" id="chatArea">

  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" class="input-box" placeholder="Describe your legal situation…"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

</script>
</body>
</html>
