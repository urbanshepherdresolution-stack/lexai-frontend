<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counsel — AI Legal Assistant</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --ink: #1a1a2e; --ink-soft: #3d3d5c; --parchment: #faf8f3; --cream: #f2ede3;
    --gold: #c8952a; --gold-light: #e8c46a; --seal: #8b1a1a; --border: #ddd8cc;
    --white: #ffffff; --user-bg: #1a1a2e; --sidebar-w: 280px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--parchment); color: var(--ink); height: 100vh; display: flex; overflow: hidden; }
  /* [All your original CSS styles remain here...] */
  .sidebar { width: var(--sidebar-w); background: var(--ink); color: #e8e4da; display: flex; flex-direction: column; flex-shrink: 0; border-right: 1px solid #2d2d4a; }
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .chat-area { flex: 1; overflow-y: auto; padding: 32px; display: flex; flex-direction: column; gap: 20px; }
  .input-area { padding: 16px 32px 20px; background: var(--white); border-top: 1px solid var(--border); }
  .input-row { display: flex; gap: 10px; max-width: 760px; margin: 0 auto; }
  .input-box { flex: 1; border: 1.5px solid var(--border); border-radius: 10px; padding: 12px 16px; background: var(--parchment); }
  .send-btn { width: 44px; height: 44px; border-radius: 10px; background: var(--ink); color: var(--gold-light); border: none; cursor: pointer; }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand"><div class="brand-name">Counsel</div><div class="brand-tagline">AI Legal Assistant</div></div>
  <div class="sidebar-section">
    <div class="sidebar-label">Practice Areas</div>
    <button class="practice-btn active" onclick="setTopic(this, 'General Legal Advice')">⚖️ General Law</button>
    <button class="practice-btn" onclick="setTopic(this, 'Tenant & Landlord Rights')">🏠 Tenant Rights</button>
    <!-- [Insert all your original buttons here] -->
  </div>
  <div class="sidebar-footer">
    Counsel provides general legal information based on the law of England and Wales. 
    We are not regulated by the SRA and do not provide formal legal advice. 
    Consult a solicitor regulated by the Law Society for complex matters.
  </div>
</aside>

<main class="main">
  <header class="header"><div class="header-topic" id="headerTopic">General Legal Advice</div></header>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" class="input-box" placeholder="Ask a question..."></textarea>
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</main>

<script>
  let currentTopic = 'General Legal Advice';

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    
    // Add User Message
    document.getElementById('chatArea').innerHTML += `<div class="msg user"><div class="msg-bubble">${text}</div></div>`;
    input.value = '';

    try {
      const response = await fetch('/api/transcribe', {
        method: 'POST',
        body: new URLSearchParams({ query: text, topic: currentTopic })
      });
      const data = await response.json();
      document.getElementById('chatArea').innerHTML += `<div class="msg ai"><div class="msg-bubble">${data.message}</div></div>`;
    } catch (e) {
      document.getElementById('chatArea').innerHTML += `<div class="msg ai"><div class="msg-bubble">Error connecting to server.</div></div>`;
    }
  }
</script>
</body>
</html>
